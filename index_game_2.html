<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国語ワードゲーム</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 24px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        .button {
            display: inline-block;
            margin: 12px 8px;
            padding: 16px 24px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .button:hover,
        .button:active {
            background-color: #45a049;
        }
        .button.secondary {
            background-color: #008cba;
        }
        .section-title {
            margin: 24px 0 16px;
            font-size: 20px;
        }
        .group-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
        }
        .group-buttons button {
            width: 140px;
        }
        .answer-buttons {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .answer-buttons button {
            width: 100%;
            font-size: 16px;
            padding: 14px 12px;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .selected {
            background-color: #ffa500 !important;
        }
        .correct {
            background-color: #4caf50;
        }
        .incorrect {
            background-color: #f44336;
        }
        .result {
            margin-top: 18px;
            font-size: 22px;
            min-height: 32px;
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .result-table th,
        .result-table td {
            border: 1px solid #ccc;
            padding: 10px;
        }
        .result-table th {
            background: #f0f0f0;
        }
        .result-table td {
            text-align: center;
        }
        .result-table .correct {
            color: #4caf50;
            font-weight: bold;
        }
        .result-table .incorrect {
            color: #f44336;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="startScreen">
            <h1>小学二年级 100词 ゲーム</h1>
            <p>スタートボタンを押すと、10個ずつのグループを選べます。</p>
            <button class="button" id="startButton">スタート</button>
        </div>

        <div id="groupScreen" style="display:none;">
            <h1>グループを選択</h1>
            <p class="section-title">どの番号帯で遊びますか？</p>
            <button class="button" id="allButton">全部</button>
            <div class="group-buttons" id="groupButtons"></div>
            <button class="button secondary" id="backButton">戻る</button>
        </div>

        <div id="gameScreen" style="display:none; text-align:left;">
            <h1 id="gameTitle">問題</h1>
            <p class="section-title" id="gameInstruction">次の日本語に対応する中国語を選んでください。</p>
            <div id="questionCount" style="font-size:18px; margin-bottom:10px;"></div>
            <div style="font-size:24px; font-weight:bold; margin-bottom:20px;" id="questionText"></div>
            <div class="answer-buttons" id="answerButtons"></div>
            <div id="actionButtons" style="margin-top:24px; text-align:center; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;">
                <button class="button secondary" id="confirmButton">確定</button>
                <button class="button secondary" id="nextButton">次の問題へ</button>
                <button class="button" id="restartButton">スタートに戻る</button>
            </div>
            <div class="result" id="resultText"></div>
            <div id="resultTableContainer" style="display:none; margin-top:20px; text-align:left;">
                <h2 style="font-size:20px; margin-bottom:10px;">結果一覧</h2>
                <div id="celebrationImageContainer" style="display:none; text-align:center; margin-bottom:20px;">
                    <img id="celebrationImage" src="" style="max-width:100%; height:auto;" />
                </div>
                <table class="result-table" id="resultTable">
                    <thead>
                        <tr><th>日本語</th><th>あなたの答え</th><th>正解</th><th>判定</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const backButton = document.getElementById('backButton');
        const allButton = document.getElementById('allButton');
        const startScreen = document.getElementById('startScreen');
        const groupScreen = document.getElementById('groupScreen');
        const gameScreen = document.getElementById('gameScreen');
        const groupButtons = document.getElementById('groupButtons');
        const answerButtons = document.getElementById('answerButtons');
        const questionText = document.getElementById('questionText');
        const questionCount = document.getElementById('questionCount');
        const gameTitle = document.getElementById('gameTitle');
        const gameInstruction = document.getElementById('gameInstruction');
        const actionButtons = document.getElementById('actionButtons');
        const confirmButton = document.getElementById('confirmButton');
        const nextButton = document.getElementById('nextButton');
        const restartButton = document.getElementById('restartButton');
        const resultText = document.getElementById('resultText');

        let allData = [];
        let currentChoices = [];
        let questionPool = [];
        let currentQuestion = null;
        let selectedChoice = null;
        let currentQuestionIndex = 0;
        let totalQuestions = 10;
        let hasAnswered = false;
        let score = 0;
        let questionResults = [];

        async function loadData() {
            try {
                const response = await fetch('data_2.json');
                allData = await response.json();
            } catch (error) {
                console.error('データ読み込みエラー', error);
                alert('データの読み込みに失敗しました。ローカルサーバーで開いてください。');
            }
        }

        startButton.addEventListener('click', async () => {
            await loadData();
            startScreen.style.display = 'none';
            groupScreen.style.display = 'block';
            renderGroupButtons();
        });

        allButton.addEventListener('click', () => {
            startAllWordsGame();
        });

        backButton.addEventListener('click', () => {
            groupScreen.style.display = 'none';
            startScreen.style.display = 'block';
        });

        restartButton.addEventListener('click', () => {
            gameScreen.style.display = 'none';
            resultText.textContent = '';
            selectedChoice = null;
            currentQuestion = null;
            groupScreen.style.display = 'block';
        });

        confirmButton.addEventListener('click', () => {
            if (!currentQuestion || !selectedChoice) {
                alert('まずは中国語のボタンを選んでください。');
                return;
            }
            if (hasAnswered) {
                return;
            }
            const isCorrect = selectedChoice === currentQuestion['中文'];
            if (isCorrect) {
                resultText.textContent = '〇 正解です！';
                resultText.style.color = '#4caf50';
                score += 1;
            } else {
                resultText.textContent = '× 残念、不正解です。';
                resultText.style.color = '#f44336';
            }
            questionResults.push({
                question: currentQuestion['にほんご'],
                selected: selectedChoice,
                correctAnswer: currentQuestion['中文'],
                correct: isCorrect
            });
            hasAnswered = true;
        });

        nextButton.addEventListener('click', () => {
            if (!hasAnswered) {
                alert('まず「確定」を押してから次の問題へ進んでください。');
                return;
            }
            currentQuestionIndex += 1;
            if (currentQuestionIndex >= totalQuestions) {
                showFinalResults();
                return;
            }
            showGameQuestion();
        });

        function renderGroupButtons() {
            if (groupButtons.children.length > 0) {
                return;
            }

            for (let i = 0; i < 10; i++) {
                const start = i * 10 + 1;
                const end = (i + 1) * 10;
                const button = document.createElement('button');
                button.className = 'button';
                button.textContent = `No.${start}-${end}`;
                button.addEventListener('click', () => {
                    startGroupGame(start, end);
                });
                groupButtons.appendChild(button);
            }
        }

        function startAllWordsGame() {
            currentChoices = allData;
            questionPool = shuffleArray([...allData]).slice(0, totalQuestions);
            currentQuestionIndex = 0;
            score = 0;
            questionResults = [];
            groupScreen.style.display = 'none';
            resultText.textContent = '';
            selectedChoice = null;
            currentQuestion = null;
            confirmButton.disabled = false;
            nextButton.disabled = false;
            confirmButton.style.display = 'inline-block';
            nextButton.style.display = 'inline-block';
            restartButton.style.display = 'inline-block';
            gameTitle.textContent = '問題';
            gameInstruction.style.display = 'block';
            actionButtons.style.display = 'flex';
            document.getElementById('resultTableContainer').style.display = 'none';
            showGameQuestion();
            gameScreen.style.display = 'block';
        }

        function startGroupGame(start, end) {
            currentChoices = allData.slice(start - 1, end);
            if (currentChoices.length === 0) {
                alert('データがありません。');
                return;
            }
            questionPool = shuffleArray(currentChoices).slice(0, totalQuestions);
            currentQuestionIndex = 0;
            score = 0;
            questionResults = [];
            groupScreen.style.display = 'none';
            resultText.textContent = '';
            selectedChoice = null;
            currentQuestion = null;
            confirmButton.disabled = false;
            nextButton.disabled = false;
            confirmButton.style.display = 'inline-block';
            nextButton.style.display = 'inline-block';
            restartButton.style.display = 'inline-block';
            gameTitle.textContent = '問題';
            gameInstruction.style.display = 'block';
            actionButtons.style.display = 'flex';
            document.getElementById('resultTableContainer').style.display = 'none';
            showGameQuestion();
            gameScreen.style.display = 'block';
        }

        function showGameQuestion() {
            if (currentQuestionIndex >= questionPool.length) {
                return;
            }
            currentQuestion = questionPool[currentQuestionIndex];
            questionCount.textContent = `問題 ${currentQuestionIndex + 1}/${totalQuestions}`;
            questionText.textContent = currentQuestion['にほんご'];
            answerButtons.innerHTML = '';
            selectedChoice = null;
            hasAnswered = false;
            resultText.textContent = '';
            const shuffledAnswers = shuffleArray([...currentChoices]);
            let answerMap = new Map();
            answerMap.set(currentQuestion['中文'], currentQuestion);
            for (let item of shuffledAnswers) {
                if (answerMap.size >= 10) break;
                answerMap.set(item['中文'], item);
            }
            const answerArray = Array.from(answerMap.entries());
            shuffleArray(answerArray);
            answerArray.forEach(([text, data]) => {
                const button = document.createElement('button');
                button.className = 'button';
                button.textContent = text;
                button.addEventListener('click', () => {
                    playSound(data);
                    selectAnswer(button, text);
                });
                answerButtons.appendChild(button);
            });
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function selectAnswer(button, text) {
            selectedChoice = text;
            resultText.textContent = '';
            Array.from(answerButtons.children).forEach(btn => {
                btn.classList.remove('selected');
            });
            button.classList.add('selected');
        }

        function showFinalResults() {
            gameTitle.textContent = '結果';
            gameInstruction.style.display = 'none';
            confirmButton.style.display = 'none';
            nextButton.style.display = 'none';
            restartButton.style.display = 'inline-block';
            actionButtons.style.display = 'flex';
            resultText.textContent = `終了！ ${totalQuestions}問中 ${score}問正解でした。`;
            resultText.style.color = '#333';
            questionText.textContent = 'ゲーム終了です。戻るボタンでグループ選択へ戻れます。';
            questionCount.textContent = '';
            answerButtons.innerHTML = '';
            nextButton.disabled = true;
            confirmButton.disabled = true;
            const tableBody = document.querySelector('#resultTable tbody');
            tableBody.innerHTML = '';
            questionResults.forEach(item => {
                const row = document.createElement('tr');
                const questionCell = document.createElement('td');
                const answerCell = document.createElement('td');
                const correctCell = document.createElement('td');
                const resultCell = document.createElement('td');
                questionCell.textContent = item.question;
                answerCell.textContent = item.selected;
                correctCell.textContent = item.correctAnswer;
                resultCell.textContent = item.correct ? '〇' : '×';
                row.appendChild(questionCell);
                row.appendChild(answerCell);
                row.appendChild(correctCell);
                row.appendChild(resultCell);
                tableBody.appendChild(row);
            });
            if (score === totalQuestions) {
                showCelebrationImage();
            } else {
                document.getElementById('celebrationImageContainer').style.display = 'none';
            }
            document.getElementById('resultTableContainer').style.display = 'block';
        }

        function playSound(row) {
            const filename = `${row['番号']}_${row['中文']}.mp3`;
            const audio = new Audio('mp3data_2/' + filename);
            audio.play().catch(() => {
                console.warn('音声再生に失敗しました。');
            });
        }
    </script>
</body>
</html>
